# College-server env (Linux x86_64 + CUDA 11.8 for 3x RTX 2080 Ti / Turing).
#
# 2080 Ti has no bf16 — training uses fp16. CUDA 11.8 is the last toolkit
# whose wheels build cleanly on Turing.
#
# Create with:  conda env create -f environment.linux-cuda.yml
# Update with:  conda env update -f environment.linux-cuda.yml --prune

name: hybridloc
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pytorch=2.3.1
  - pytorch-cuda=11.8
  - pip:
      - -e .[dev]
